<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TechPulse — Actualités Tech</title>
<style>
:root {
  --bg-deep:    #1a0a1e;
  --bg-card:    #2a0d32;
  --bg-panel:   #220c2a;
  --bg-input:   #331040;
  --accent-primary: #c8379a;
  --accent-soft:    #a0246e;
  --accent-glow:    #e060b8;
  --accent-light:   #f0a0d8;
  --accent-violet:  #7b2fa0;
  --accent-lilac:   #b06cd0;
  --text-primary: #f5e8f5;
  --text-secondary: #c0a0c8;
  --text-muted:   #8a6090;
  --border:       #4a1a58;
  --border-soft:  #3a1248;
  --success:      #7ecba0;
  --warning:      #e0a060;
  --danger:       #e06080;
  --info:         #80b0e8;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-deep); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ── AMBIENT BG ── */
.ambient {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,55,154,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 80%, rgba(123,47,160,0.10) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 60% 30%, rgba(160,36,110,0.08) 0%, transparent 70%);
}

/* ── LAYOUT ── */
.shell { display: flex; min-height: 100vh; position: relative; z-index: 1; }

/* ── SIDEBAR ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--bg-panel);
  border-right: 0.5px solid var(--border);
  display: flex; flex-direction: column;
  padding: 1.5rem 0;
  position: sticky; top: 0; height: 100vh;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 0 1.25rem 1.5rem;
  border-bottom: 0.5px solid var(--border-soft);
  margin-bottom: 1rem;
}
.logo-mark {
  display: flex; align-items: center; gap: 10px;
}
.logo-icon {
  width: 36px; height: 36px; border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-violet));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-text { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

.nav-section { padding: 0 0.75rem; margin-bottom: 0.5rem; }
.nav-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
  color: var(--text-muted); padding: 0 0.5rem; margin-bottom: 0.4rem;
  text-transform: uppercase;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; color: var(--text-secondary);
  transition: all 0.15s; margin-bottom: 2px; border: none;
  background: transparent; width: 100%; text-align: left;
}
.nav-item:hover { background: rgba(200,55,154,0.1); color: var(--text-primary); }
.nav-item.active {
  background: rgba(200,55,154,0.18);
  color: var(--accent-glow);
  border-left: 3px solid var(--accent-primary);
  padding-left: 9px;
}
.nav-item .nav-icon { font-size: 17px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto; font-size: 10px; font-weight: 600;
  background: var(--accent-primary); color: #fff;
  padding: 2px 7px; border-radius: 999px;
}

.sidebar-footer {
  margin-top: auto; padding: 1rem 1.25rem 0;
  border-top: 0.5px solid var(--border-soft);
}
.user-chip {
  display: flex; align-items: center; gap: 10px;
}
.avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-soft), var(--accent-violet));
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.user-role { font-size: 11px; color: var(--text-muted); }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── TOPBAR ── */
.topbar {
  background: rgba(26,10,30,0.85);
  backdrop-filter: blur(12px);
  border-bottom: 0.5px solid var(--border);
  padding: 0 1.5rem;
  height: 60px;
  display: flex; align-items: center; gap: 1rem;
  position: sticky; top: 0; z-index: 20;
}
.page-title { font-size: 16px; font-weight: 500; color: var(--text-primary); }
.search-bar {
  flex: 1; max-width: 400px; margin-left: auto;
  position: relative;
}
.search-bar input {
  width: 100%; padding: 8px 12px 8px 36px;
  background: var(--bg-input); border: 0.5px solid var(--border);
  border-radius: var(--radius-xl); color: var(--text-primary);
  font-size: 14px; outline: none; transition: border-color 0.15s;
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-bar input:focus { border-color: var(--accent-soft); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text-muted); font-size: 15px;
}
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.tb-btn {
  width: 38px; height: 38px; border-radius: var(--radius-sm);
  background: var(--bg-input); border: 0.5px solid var(--border);
  color: var(--text-secondary); font-size: 17px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; position: relative;
}
.tb-btn:hover { border-color: var(--accent-soft); color: var(--accent-glow); }
.notif-dot {
  position: absolute; top: 7px; right: 7px;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent-primary); border: 1.5px solid var(--bg-deep);
}

/* ── CONTENT ── */
.content { flex: 1; padding: 1.5rem; overflow-y: auto; }

/* ── CATEGORY PILLS ── */
.cat-strip {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem;
}
.cat-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 999px;
  border: 0.5px solid var(--border);
  background: transparent; cursor: pointer;
  font-size: 13px; color: var(--text-secondary);
  transition: all 0.15s; white-space: nowrap;
}
.cat-pill:hover { border-color: var(--accent-soft); color: var(--text-primary); }
.cat-pill.active {
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-violet));
  border-color: transparent; color: #fff; font-weight: 500;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap: 12px; margin-bottom: 1.5rem;
}
.stat-card {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 1rem 1.25rem;
  position: relative; overflow: hidden;
}
.stat-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-violet));
}
.stat-icon { font-size: 22px; margin-bottom: 8px; }
.stat-val { font-size: 26px; font-weight: 600; color: var(--text-primary); }
.stat-lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.stat-delta {
  font-size: 11px; margin-top: 4px;
  display: flex; align-items: center; gap: 4px;
}
.delta-up { color: var(--success); }
.delta-down { color: var(--danger); }

/* ── SECTION HEADER ── */
.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.sec-title {
  font-size: 15px; font-weight: 500; color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}
.sec-title-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-primary);
}
.sec-action {
  font-size: 13px; color: var(--accent-glow); cursor: pointer;
  background: none; border: none;
}

/* ── FEATURED GRID ── */
.feat-grid {
  display: grid; gap: 12px; margin-bottom: 1.5rem;
  grid-template-columns: repeat(auto-fill, minmax(280px,1fr));
}
.art-card {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem;
  cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; gap: 10px;
  position: relative; overflow: hidden;
}
.art-card::after {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(to top, rgba(42,13,50,0.6), transparent);
  pointer-events: none;
}
.art-card:hover {
  border-color: var(--accent-soft);
  transform: translateY(-2px);
}
.art-card:hover::before {
  content: ''; position: absolute;
  inset: 0; border-radius: var(--radius-lg);
  background: rgba(200,55,154,0.04);
  pointer-events: none;
}

.art-cat {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 3px 10px;
  border-radius: 999px; width: fit-content;
}
.art-title {
  font-size: 15px; font-weight: 500; color: var(--text-primary);
  line-height: 1.45;
}
.art-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.55;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden;
}
.art-meta {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text-muted); margin-top: auto;
}
.art-source {
  padding: 2px 8px; border-radius: var(--radius-sm);
  background: var(--bg-input); color: var(--text-secondary);
  font-size: 11px;
}
.bm-btn-card {
  margin-left: auto; background: none; border: none;
  cursor: pointer; font-size: 16px; color: var(--text-muted);
  transition: color 0.15s; z-index: 1;
}
.bm-btn-card:hover { color: var(--accent-glow); }
.bm-btn-card.saved { color: var(--accent-glow); }

/* ── TRENDING LIST ── */
.trend-list { margin-bottom: 1.5rem; }
.trend-row {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: var(--radius-md); padding: 1rem 1.25rem;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all 0.15s; margin-bottom: 8px;
}
.trend-row:hover { border-color: var(--accent-soft); }
.trend-num {
  font-size: 24px; font-weight: 700;
  color: var(--border); min-width: 32px; line-height: 1;
}
.trend-body { flex: 1; min-width: 0; }
.trend-title {
  font-size: 14px; font-weight: 500; color: var(--text-primary);
  line-height: 1.4; margin-bottom: 4px;
}
.trend-meta {
  font-size: 12px; color: var(--text-muted);
  display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.trend-views {
  margin-left: auto; font-size: 12px; color: var(--text-muted);
  display: flex; align-items: center; gap: 4px;
}

/* ── LOADING ── */
.loading-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 14px; padding: 4rem;
  color: var(--text-secondary);
}
.spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--accent-primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10,0,14,0.75);
  backdrop-filter: blur(8px);
  z-index: 200; display: flex;
  align-items: center; justify-content: center;
  padding: 1.5rem;
}
.modal-box {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: var(--radius-xl); padding: 1.75rem;
  max-width: 560px; width: 100%;
  max-height: 85vh; overflow-y: auto;
}
.modal-cat {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  text-transform: uppercase; padding: 3px 10px;
  border-radius: 999px; width: fit-content; margin-bottom: 12px;
}
.modal-title {
  font-size: 19px; font-weight: 600; color: var(--text-primary);
  line-height: 1.4; margin-bottom: 12px;
}
.modal-desc {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
  margin-bottom: 1.25rem;
}
.modal-actions {
  display: flex; align-items: center; justify-content: space-between;
}
.modal-close {
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); font-size: 22px; transition: color 0.15s;
}
.modal-close:hover { color: var(--text-primary); }
.read-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 20px; border-radius: 999px;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-violet));
  color: #fff; font-size: 14px; font-weight: 500;
  border: none; cursor: pointer; transition: opacity 0.15s;
  text-decoration: none;
}
.read-btn:hover { opacity: 0.88; }

/* ── ADMIN DASHBOARD ── */
.admin-wrap { padding-bottom: 2rem; }

.admin-banner {
  background: linear-gradient(135deg, rgba(200,55,154,0.15), rgba(123,47,160,0.15));
  border: 0.5px solid var(--accent-soft);
  border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
  display: flex; align-items: center; gap: 14px; margin-bottom: 1.5rem;
}
.admin-banner-icon { font-size: 28px; }
.admin-banner-text h2 { font-size: 16px; font-weight: 500; color: var(--text-primary); }
.admin-banner-text p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

.admin-grid {
  display: grid; gap: 16px;
  grid-template-columns: repeat(auto-fill, minmax(300px,1fr));
}
.admin-card {
  background: var(--bg-card); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); padding: 1.25rem;
}
.admin-card-title {
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  margin-bottom: 1rem; display: flex; align-items: center; gap: 8px;
  text-transform: uppercase; letter-spacing: 0.05em; font-size: 11px;
}

/* Chart bars */
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; color: var(--text-secondary); width: 90px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { flex: 1; height: 8px; background: var(--bg-input); border-radius: 999px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 999px; transition: width 1s ease; }
.bar-val { font-size: 12px; color: var(--text-muted); width: 36px; text-align: right; flex-shrink: 0; }

/* Donut chart */
.donut-wrap { display: flex; align-items: center; gap: 1.5rem; }
.donut-svg { flex-shrink: 0; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Line mini chart */
.mini-line { overflow: visible; }

/* Activity feed */
.activity-list { display: flex; flex-direction: column; gap: 10px; }
.activity-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding-bottom: 10px; border-bottom: 0.5px solid var(--border-soft);
}
.activity-item:last-child { border-bottom: none; padding-bottom: 0; }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0;
}
.activity-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.activity-text strong { color: var(--text-primary); font-weight: 500; }
.activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* User table */
.user-table { width: 100%; border-collapse: collapse; }
.user-table th {
  text-align: left; font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
  color: var(--text-muted); text-transform: uppercase;
  padding: 6px 8px; border-bottom: 0.5px solid var(--border-soft);
}
.user-table td {
  padding: 9px 8px; font-size: 13px; color: var(--text-secondary);
  border-bottom: 0.5px solid var(--border-soft);
}
.user-table tr:last-child td { border-bottom: none; }
.user-table td:first-child { color: var(--text-primary); }
.status-badge {
  padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
}

/* Alert list */
.alert-list { display: flex; flex-direction: column; gap: 8px; }
.alert-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-md);
  font-size: 13px;
}
.alert-item.warn  { background: rgba(224,160,96,0.1);  border: 0.5px solid rgba(224,160,96,0.3);  color: var(--warning); }
.alert-item.info  { background: rgba(128,176,232,0.1); border: 0.5px solid rgba(128,176,232,0.3); color: var(--info); }
.alert-item.error { background: rgba(224,96,128,0.1);  border: 0.5px solid rgba(224,96,128,0.3);  color: var(--danger); }
.alert-icon { font-size: 16px; flex-shrink: 0; }

/* Heatmap */
.heatmap-grid { display: flex; gap: 4px; flex-wrap: wrap; }
.heat-cell {
  width: 28px; height: 28px; border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-muted); cursor: default;
  transition: transform 0.1s;
}
.heat-cell:hover { transform: scale(1.15); }

/* KPI gauge */
.gauge-row { display: flex; gap: 16px; flex-wrap: wrap; }
.gauge-item { flex: 1; min-width: 80px; text-align: center; }
.gauge-val { font-size: 22px; font-weight: 600; color: var(--text-primary); }
.gauge-bar {
  height: 4px; background: var(--bg-input); border-radius: 999px;
  margin: 6px 0; overflow: hidden;
}
.gauge-fill { height: 100%; border-radius: 999px; }
.gauge-lbl { font-size: 11px; color: var(--text-muted); }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .feat-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="ambient"></div>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">🌸</div>
        <div>
          <div class="logo-text">TechPulse</div>
          <div class="logo-sub">Actualités Tech</div>
        </div>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">Navigation</div>
      <button class="nav-item active" data-view="feed" onclick="switchView('feed',this)">
        <span class="nav-icon">📰</span> Fil d'actualité
        <span class="nav-badge" id="feedBadge">9</span>
      </button>
      <button class="nav-item" data-view="bookmarks" onclick="switchView('bookmarks',this)">
        <span class="nav-icon">🔖</span> Favoris
      </button>
    </div>

    <div class="nav-section" style="margin-top:0.5rem">
      <div class="nav-label">Catégories</div>
      <button class="nav-item" onclick="filterCat('dev',this)"><span class="nav-icon">💻</span> Développement</button>
      <button class="nav-item" onclick="filterCat('cyber',this)"><span class="nav-icon">🛡️</span> Cybersécurité</button>
      <button class="nav-item" onclick="filterCat('ai',this)"><span class="nav-icon">🤖</span> IA & ML</button>
      <button class="nav-item" onclick="filterCat('iot',this)"><span class="nav-icon">📡</span> IoT / LPWAN</button>
      <button class="nav-item" onclick="filterCat('cloud',this)"><span class="nav-icon">☁️</span> Cloud & DevOps</button>
      <button class="nav-item" onclick="filterCat('mobile',this)"><span class="nav-icon">📱</span> Mobile</button>
      <button class="nav-item" onclick="filterCat('web3',this)"><span class="nav-icon">⛓️</span> Blockchain</button>
    </div>

    <div class="nav-section" style="margin-top:0.5rem">
      <div class="nav-label">Admin</div>
      <button class="nav-item" data-view="admin" onclick="switchView('admin',this)">
        <span class="nav-icon">📊</span> Dashboard Admin
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar">M</div>
        <div>
          <div class="user-name">Mllemae</div>
          <div class="user-role">Administrateur</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="page-title" id="pageTitle">Fil d'actualité</div>
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Rechercher..."/>
      </div>

function getCat(id){ return CATS.find(c=>c.id===id)||CATS[0]; }
function timeAgo(mins){

  if(mins<1440) return Math.floor(mins/60)+'h';

}
function isBM(title){ return bookmarks.includes(title); }
function toggleBM(title, btn){
  if(isBM(title)){ bookmarks=bookmarks.filter(b=>b!==title); }

}

const GNEWS_KEY = '1982130847deba5470a0a8ff9a9417a1';

async function fetchNews(){
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading-state"><div class="spinner"></div><span>Chargement...</span></div>';
  
  const cat = getCat(currentCat);
  
  try {
    const res = await fetch(`https://gnews.io/api/v4/search?q=${encodeURIComponent(cat.kw)}&lang=fr&max=8&apikey=${GNEWS_KEY}`);
    const data = await res.json();
    
    if(data.articles && data.articles.length > 0){
      allArticles = data.articles.map((a,i) => ({
        title: a.title,
        desc: a.description || '',
        src: a.source?.name || 'Source',
        url: a.url,
        cat: currentCat,
        views: Math.floor(Math.random()*5000)+500,
        mins: i * 90 + 30,
      }));
    } else {
      throw new Error('no results');
    }
  } catch(e) {
    // Fallback sur les données mock si l'API échoue
    const pool = MOCK[currentCat] || MOCK['all'];
    allArticles = pool.map((a,i) => ({...a, cat:currentCat, url:'#', mins: 30+i*120}));
  }
  
  renderFeed();
}

    </div>

    <!-- KPI TOP -->
    <div class="stats-row" style="margin-bottom:1.5rem">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-val">1 284</div>
        <div class="stat-lbl">Utilisateurs actifs</div>
        <div class="stat-delta delta-up">↑ 18% vs sem. passée</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📖</div>
        <div class="stat-val">8 432</div>
        <div class="stat-lbl">Articles lus aujourd'hui</div>
        <div class="stat-delta delta-up">↑ 24% vs hier</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏱️</div>
        <div class="stat-val">4:32</div>
        <div class="stat-lbl">Temps moyen / session</div>
        <div class="stat-delta delta-down">↓ 5% vs sem. passée</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔁</div>
        <div class="stat-val">62%</div>
        <div class="stat-lbl">Taux de retour</div>
        <div class="stat-delta delta-up">↑ 7% vs mois dernier</div>
      </div>
    </div>

    <div class="admin-grid">

      <!-- VUES PAR CATÉGORIE -->
      <div class="admin-card" style="grid-column: span 2">
        <div class="admin-card-title">📊 Vues par catégorie</div>
        <div class="bar-chart">
          ${catViews.map(c=>`
            <div class="bar-row">
              <div class="bar-label">${c.emoji} ${c.label}</div>
              <div class="bar-track">
                <div class="bar-fill" style="width:${Math.round(c.val/maxVal*100)}%;background:${c.color}"></div>
              </div>
              <div class="bar-val">${(c.val/1000).toFixed(1)}k</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- DEVICES -->
      <div class="admin-card">
        <div class="admin-card-title">📱 Appareils utilisés</div>
        <div class="donut-wrap">
          <svg class="donut-svg" width="130" height="130" viewBox="0 0 130 130">
            <circle cx="65" cy="65" r="54" fill="none" stroke="var(--bg-input)" stroke-width="18"/>
            ${slices}
            <text x="65" y="68" text-anchor="middle" fill="var(--text-primary)" font-size="14" font-weight="600">100%</text>
          </svg>
          <div class="donut-legend">
            ${devicesData.map(d=>`
              <div class="legend-item">
                <div class="legend-dot" style="background:${d.col}"></div>
                <span>${d.l}</span>
                <strong style="color:var(--text-primary);margin-left:4px">${d.v}%</strong>
              </div>
            `).join('')}
          </div>
        </div>
      </div>

      <!-- TRAFIC SEMAINE -->
      <div class="admin-card">
        <div class="admin-card-title">📈 Trafic — 7 derniers jours</div>
        <svg width="100%" height="110" viewBox="0 0 280 110" style="overflow:visible">
          <defs>
            <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#c8379a" stop-opacity="0.3"/>
              <stop offset="100%" stop-color="#c8379a" stop-opacity="0"/>
            </linearGradient>
          </defs>
          ${(()=>{
            const pts = weekViews.map((v,i)=>{
              const x = 20+i*(240/6); const y = 90-Math.round(v/maxW*75); return [x,y];
            });
            const areaPath='M'+pts.map(p=>p.join(',')).join('L')+`L${pts[pts.length-1][0]},95 L${pts[0][0]},95 Z`;
            const linePath='M'+pts.map(p=>p.join(',')).join('L');
            const circles=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="#c8379a"/>`).join('');
            const labels=pts.map((p,i)=>`<text x="${p[0]}" y="105" text-anchor="middle" fill="var(--text-muted)" font-size="10">${weekDays[i]}</text>`).join('');
            const vals=pts.map((p,i)=>`<text x="${p[0]}" y="${p[1]-7}" text-anchor="middle" fill="var(--text-secondary)" font-size="9">${(weekViews[i]/1000).toFixed(1)}k</text>`).join('');
            return `<path d="${areaPath}" fill="url(#lineGrad)"/>
                    <path d="${linePath}" fill="none" stroke="#c8379a" stroke-width="2" stroke-linejoin="round"/>
                    ${circles}${labels}${vals}`;
          })()}
        </svg>
      </div>

      <!-- HEATMAP NAVIGATION -->
      <div class="admin-card" style="grid-column: span 2">
        <div class="admin-card-title">🗓️ Carte de chaleur — Activité par heure et jour</div>
        <div style="overflow-x:auto">
          <table style="border-collapse:separate;border-spacing:4px;font-size:11px">
            <tr>
              <td style="color:var(--text-muted);padding:0 6px 4px 0;font-size:10px"></td>
              ${hours.map(h=>`<td style="color:var(--text-muted);text-align:center;padding-bottom:4px;font-size:10px">${h}h</td>`).join('')}
            </tr>
            ${days.map((d,di)=>`
              <tr>
                <td style="color:var(--text-muted);padding-right:6px;font-size:11px;white-space:nowrap">${d}</td>
                ${hours.map((h,hi)=>{
                  const v=heatData[di][hi];
                  return `<td title="${d} ${h}h — ${v} visites" style="width:28px;height:24px;background:${heatColor(v)};border-radius:4px;text-align:center;cursor:default"></td>`;
                }).join('')}
              </tr>
            `).join('')}
          </table>
          <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--text-muted)">
            Faible
            ${[0.05,0.15,0.35,0.60,0.90].map(o=>`<div style="width:20px;height:12px;border-radius:3px;background:rgba(200,55,154,${o})"></div>`).join('')}
            Fort
          </div>
        </div>
      </div>

      <!-- UTILISATEURS RÉCENTS -->
      <div class="admin-card" style="grid-column: span 2">
        <div class="admin-card-title">👤 Utilisateurs actifs récents</div>
        <table class="user-table">
          <thead>
            <tr>
              <th>Nom</th>
              <th>Catégorie favorite</th>
              <th>Sessions</th>
              <th>Dernière activité</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody>
            ${recentUsers.map(u=>`
              <tr>
                <td>${u.name}</td>
                <td>${u.cat}</td>
                <td>${u.sessions}</td>
                <td>il y a ${u.time}</td>
                <td><span class="status-badge" style="${u.status==='Actif'?'background:rgba(126,203,160,0.15);color:#7ecba0':'background:rgba(138,96,144,0.15);color:var(--text-muted)'}">${u.status}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>

      <!-- ACTIVITÉ RÉCENTE -->
      <div class="admin-card">
        <div class="admin-card-title">⚡ Activité en temps réel</div>
        <div class="activity-list">
          ${activities.map(a=>`
            <div class="activity-item">
              <div class="activity-dot" style="background:${a.color}"></div>
              <div>
                <div class="activity-text">${a.text}</div>
                <div class="activity-time">${a.time}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- ALERTES ── -->
      <div class="admin-card">
        <div class="admin-card-title">🚨 Alertes système</div>
        <div class="alert-list">
          ${alerts.map(a=>`
            <div class="alert-item ${a.type}">
              <span class="alert-icon">${a.icon}</span>
              <span>${a.text}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- KPI ENGAGEMENT -->
      <div class="admin-card">
        <div class="admin-card-title">🎯 KPIs d'engagement</div>
        <div class="gauge-row">
          ${[
            {l:'Articles lus',v:78,col:'#c8379a'},
            {l:'Taux retour',v:62,col:'#7b2fa0'},
            {l:'Favoris/user',v:45,col:'#b06cd0'},
            {l:'Partages',v:31,col:'#80b0e8'},
          ].map(g=>`
            <div class="gauge-item">
              <div class="gauge-val">${g.v}%</div>
              <div class="gauge-bar"><div class="gauge-fill" style="width:${g.v}%;background:${g.col}"></div></div>
              <div class="gauge-lbl">${g.l}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <!-- SOURCES POPULAIRES -->
      <div class="admin-card">
        <div class="admin-card-title">📡 Sources les plus lues</div>
        <div class="bar-chart">
          ${[
            {l:'The Verge',v:92,col:'#c8379a'},
            {l:'Bleeping Comp.',v:78,col:'#a0246e'},
            {l:'Dev.to',v:71,col:'#7b2fa0'},
            {l:'CERT-FR',v:65,col:'#b06cd0'},
            {l:'Hugging Face',v:58,col:'#534ab7'},
            {l:'ANSSI',v:41,col:'#80b0e8'},
          ].map(b=>`
            <div class="bar-row">
              <div class="bar-label">${b.l}</div>
              <div class="bar-track"><div class="bar-fill" style="width:${b.v}%;background:${b.col}"></div></div>
              <div class="bar-val">${b.v}%</div>
            </div>
          `).join('')}
        </div>
      </div>

    </div>
  </div>`;
}

// ─── SEARCH ─────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', ()=>{
  if(currentView==='feed') renderFeed();
});

// ─── INIT ────────────────────────────────────────────────────────────────────
fetchNews();
</script>
</body>
</html>
